<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión - PymeTrack Repartidor</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .offline-container {
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      text-align: center;
      max-width: 400px;
      margin: 1rem;
    }
    
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    
    h1 {
      color: #1f2937;
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
    }
    
    p {
      color: #6b7280;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    
    .retry-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s;
      min-height: 44px;
    }
    
    .retry-btn:hover {
      background: #1d4ed8;
    }
    
    .retry-btn:active {
      transform: scale(0.95);
    }
    
    .cached-data {
      margin-top: 2rem;
      padding: 1rem;
      background: #f3f4f6;
      border-radius: 0.5rem;
      text-align: left;
    }
    
    .cached-data h3 {
      margin: 0 0 0.5rem 0;
      color: #374151;
      font-size: 1rem;
    }
    
    .cached-data p {
      margin: 0;
      font-size: 0.875rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="icon">📵</div>
    <h1>Sin Conexión</h1>
    <p>No tienes conexión a internet. Algunas funciones pueden no estar disponibles temporalmente.</p>
    
    <button class="retry-btn" onclick="window.location.reload()">
      Reintentar
    </button>
    
    <div class="cached-data">
      <h3>📦 Datos Disponibles Offline</h3>
      <p>Puedes ver tus pedidos asignados recientes. Los cambios se sincronizarán cuando vuelvas a tener conexión.</p>
    </div>
  </div>
  
  <script>
    // Intentar recargar cada 30 segundos
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload();
      }
    }, 30000);
    
    // Escuchar eventos de conexión
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
