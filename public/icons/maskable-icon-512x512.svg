<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#2563eb"/>
  
  <!-- Delivery Truck Icon (larger) -->
  <g transform="translate(128, 128)">
    <!-- Truck Body -->
    <rect x="20" y="85" width="170" height="110" rx="10" fill="white"/>
    <!-- Truck Cabin -->
    <rect x="190" y="105" width="65" height="90" rx="10" fill="white"/>
    <!-- Wheels -->
    <circle cx="60" cy="220" r="20" fill="#1e40af"/>
    <circle cx="150" cy="220" r="20" fill="#1e40af"/>
    <circle cx="215" cy="220" r="20" fill="#1e40af"/>
    <!-- Package on truck -->
    <rect x="85" y="50" width="40" height="35" rx="5" fill="#fbbf24"/>
    <!-- Second package -->
    <rect x="130" y="50" width="40" height="35" rx="5" fill="#f59e0b"/>
  </g>
  
  <!-- PymeTrack Text (larger) -->
  <text x="256" y="380" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="36" font-weight="bold">
    PYME
  </text>
  <text x="256" y="420" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="28">
    REPARTIDOR
  </text>
</svg>
